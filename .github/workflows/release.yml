name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Bump, changelog, and tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --bump --output CHANGELOG.md
        env:
          OUTPUT: CHANGELOG.md

      - name: Determine next version
        id: version
        shell: sh
        run: |
          raw_version="${{ steps.git-cliff.outputs.version }}"
          version="${raw_version#v}"
          tag="v$version"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "No release needed; $tag already exists."
            echo "release=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          echo "release=true" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"

      - name: Update script version
        if: steps.version.outputs.release == 'true'
        shell: sh
        run: |
          sed -i "s/^VERSION=.*/VERSION=\"${{ steps.version.outputs.version }}\"/" passs.sh

      - name: Create release PR
        id: pr
        if: steps.version.outputs.release == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: ${{ steps.version.outputs.tag }}"
          branch: "release/${{ steps.version.outputs.tag }}"
          title: "chore: ${{ steps.version.outputs.tag }}"
          body: ""
          delete-branch: true

      - name: Merge release PR
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: sh
        run: gh pr merge ${{ steps.pr.outputs.pull-request-number }} --squash --delete-branch

      - name: Tag release
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: sh
        run: |
          git fetch origin main
          git tag "${{ steps.version.outputs.tag }}" origin/main
          git push origin "${{ steps.version.outputs.tag }}"
